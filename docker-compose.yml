version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:./prisma/dev.db
      NEXTAUTH_SECRET: test-secret-key-muito-longo-para-desenvolvimento-local
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: development
    volumes:
      - ./prisma:/app/prisma
    working_dir: /app

